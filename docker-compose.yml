# 投放数据平台 —— Docker 部署
# 启动：docker compose up -d --build
# 访问：http://<服务器IP>:8060
services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ad_data
      TZ: Asia/Shanghai
    volumes:
      - cmb_pgdata:/var/lib/postgresql   # postgres:18+ 要求挂在此路径(数据落到版本子目录)
    ports:
      - "127.0.0.1:5433:5432"            # 仅本机可达，供 SSH 隧道给本地脚本写库(如小飞机短信登录)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ad_data"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  app:
    build: ./pipeline
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ad_data
      TZ: Asia/Shanghai
    ports:
      - "8060:8060"
    volumes:
      - cmb_profiles:/app/profiles        # 浏览器登录态持久化(跨容器重建保留会话，减少重登)
      - ./appdata/auth_secret.txt:/app/auth_secret.txt   # 登录签名密钥持久化(否则每次重建会登出所有人)
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  cmb_pgdata:
  cmb_profiles:
