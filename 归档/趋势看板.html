<style>
:root{--bg:#0f1117;--panel:#171a23;--panel2:#1d212c;--line:#2a2f3d;--text:#e6e9f0;--muted:#8b93a7;--accent:#5b8cff;--accent2:#27c498;--warn:#ffb454;--chip:#232838}
*{box-sizing:border-box}html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--text);font:14px/1.5 -apple-system,"Segoe UI","Microsoft YaHei",sans-serif}
header{padding:16px 22px;border-bottom:1px solid var(--line);background:var(--panel);display:flex;align-items:center;gap:14px;flex-wrap:wrap}
header h1{font-size:18px;margin:0;font-weight:600}
header .sub{color:var(--muted);font-size:12px}
.wrap{padding:16px 22px 60px;max-width:1400px;margin:0 auto}
.controls{display:flex;gap:18px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.ctl{display:flex;flex-direction:column;gap:6px}
.ctl label{font-size:11px;color:var(--muted);letter-spacing:.5px}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:5px 12px;border-radius:20px;background:var(--chip);border:1px solid var(--line);cursor:pointer;font-size:13px;user-select:none;transition:.15s}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
select,.seg{background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-size:13px;outline:none}
.seg{display:inline-flex;padding:2px;gap:2px}
.seg button{background:transparent;border:0;color:var(--muted);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:13px}
.seg button.on{background:var(--accent);color:#fff}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.kpi .t{font-size:12px;color:var(--muted)}
.kpi .v{font-size:24px;font-weight:700;margin-top:4px}
.kpi .v small{font-size:13px;color:var(--muted);font-weight:400}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:16px}
.card h3{margin:0 0 10px;font-size:14px;font-weight:600}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
#trend{height:420px}#platBar{height:300px}#stack{height:300px}
@media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}}
</style></head>

const PLATS=["小飞机","沸点","微橙","麦斯"];
const PC={"小飞机":"#5b8cff","沸点":"#27c498","微橙":"#ffb454","麦斯":"#e05fae"};
const METRICS=[
 {k:"cost",label:"总消费(元)",type:"sum",fmt:"money"},
 {k:"rpay",label:"真实付款金额(元)",type:"sum",fmt:"money"},
 {k:"rroi",label:"真实ROI",type:"ratio",num:"rpay",den:"cost",fmt:"x2"},
 {k:"roi",label:"ROI",type:"ratio",num:"pay",den:"cost",fmt:"x2"},
 {k:"pay",label:"付款金额(元)",type:"sum",fmt:"money"},
 {k:"rord",label:"真实订单数",type:"sum",fmt:"int"},
 {k:"ord",label:"订单数",type:"sum",fmt:"int"},
 {k:"imp",label:"展示量",type:"sum",fmt:"int"},
 {k:"clk",label:"点击量",type:"sum",fmt:"int"},
 {k:"ctr",label:"点击率(%)",type:"ratio",num:"clk",den:"imp",mul:100,fmt:"x2"},
 {k:"cpm",label:"CPM(元)",type:"ratio",num:"cost",den:"imp",mul:1000,fmt:"x2"},
 {k:"cpc",label:"CPC(元)",type:"ratio",num:"cost",den:"clk",fmt:"x2"},
 {k:"conv",label:"转化数",type:"sum",fmt:"int"},
 {k:"convcost",label:"转化成本(元)",type:"ratio",num:"cost",den:"conv",fmt:"x2"},
 {k:"rdamt",label:"真实直推付款金额(元)",type:"sum",fmt:"money"},
 {k:"rr",label:"退款率(%)",type:"wavg",w:"cost",fmt:"x2"},
];
let state={plats:new Set(PLATS),metric:"cost",gran:"day",group:"platform"};

function monday(ds){const d=new Date(ds+"T00:00:00");const wd=(d.getDay()+6)%7;d.setDate(d.getDate()-wd);return d.toISOString().slice(0,10);}
function tkey(ds){return state.gran==="day"?ds:state.gran==="month"?ds.slice(0,7):monday(ds);}
function fmtNum(v,fmt){if(v==null||isNaN(v))return "-";if(fmt==="money")return "¥"+Math.round(v).toLocaleString();if(fmt==="int")return Math.round(v).toLocaleString();if(fmt==="x2")return (Math.round(v*100)/100).toLocaleString();return v;}
function metricDef(k){return METRICS.find(m=>m.k===k);}
function rowsF(){return DATA.filter(r=>state.plats.has(r.p));}

// aggregate base sums by key(s)
function agg(rows,keyFn){const m={};for(const r of rows){const K=keyFn(r);let a=m[K];if(!a){a=m[K]={imp:0,clk:0,conv:0,cost:0,ord:0,pay:0,rpay:0,rord:0,rdamt:0,_rrw:0};}
  a.imp+=r.imp;a.clk+=r.clk;a.conv+=r.conv;a.cost+=r.cost;a.ord+=r.ord;a.pay+=r.pay;a.rpay+=r.rpay;a.rord+=r.rord;a.rdamt+=r.rdamt;a._rrw+=r.rr*r.cost;}
  return m;}
function metricVal(a,def){if(!a)return 0;if(def.type==="sum")return a[def.k];if(def.type==="ratio"){const d=a[def.den];return d?a[def.num]/d*(def.mul||1):0;}if(def.type==="wavg"){return a.cost?a._rrw/a.cost:0;}return 0;}

function topAccounts(rows,n){const m=agg(rows,r=>r.a);return Object.entries(m).sort((x,y)=>y[1].cost-x[1].cost).slice(0,n).map(e=>e[0]);}

function renderKPI(){
  const rows=rowsF();const a=agg(rows,()=>"all").all||{cost:0,rpay:0,rord:0,imp:0,_rrw:0};
  const items=[
   ["总消费","¥"+Math.round(a.cost).toLocaleString()],
   ["真实付款金额(GMV)","¥"+Math.round(a.rpay).toLocaleString()],
   ["整体真实ROI",(a.cost?a.rpay/a.cost:0).toFixed(2)],
   ["真实订单数",Math.round(a.rord).toLocaleString()],
   ["加权退款率",(a.cost?a._rrw/a.cost:0).toFixed(2)+"%"],
  ];
  document.getElementById("kpis").innerHTML=items.map(i=>`<div class="kpi"><div class="t">${i[0]}</div><div class="v">${i[1]}</div></div>`).join("");
}

let trendChart,stackChart,barChart;
function renderTrend(){
  const def=metricDef(state.metric);const rows=rowsF();
  const times=[...new Set(rows.map(r=>tkey(r.d)))].sort();
  let series=[],legend=[];
  const mkSeries=(name,color,filt)=>{
    const m=agg(rows.filter(filt),r=>tkey(r.d));
    return {name,type:"line",smooth:true,showSymbol:false,itemStyle:color?{color}:undefined,
      data:times.map(t=>{const v=metricVal(m[t],def);return v?+v.toFixed(2):(def.type==="sum"?0:null);})};
  };
  if(state.group==="platform"){
    for(const p of PLATS){if(!state.plats.has(p))continue;legend.push(p);series.push(mkSeries(p,PC[p],r=>r.p===p));}
  }else if(state.group==="account"){
    const tops=topAccounts(rows,10);
    for(const a of tops){legend.push(a);series.push(mkSeries(a,null,r=>r.a===a));}
  }else{legend.push("总计");series.push(mkSeries("总计","#5b8cff",()=>true));}
  document.getElementById("trendTitle").textContent=def.label+" · 趋势（"+({day:"按日",week:"按周",month:"按月"}[state.gran])+"）";
  trendChart.setOption({
    tooltip:{trigger:"axis",backgroundColor:"#1d212c",borderColor:"#2a2f3d",textStyle:{color:"#e6e9f0"},
      valueFormatter:v=>fmtNum(v,def.fmt)},
    legend:{data:legend,textStyle:{color:"#8b93a7"},type:"scroll",top:0},
    grid:{left:60,right:24,top:36,bottom:40},
    xAxis:{type:"category",data:times,axisLine:{lineStyle:{color:"#2a2f3d"}},axisLabel:{color:"#8b93a7"}},
    yAxis:{type:"value",splitLine:{lineStyle:{color:"#20242f"}},axisLabel:{color:"#8b93a7"}},
    dataZoom:[{type:"inside"},{type:"slider",height:16,bottom:8,borderColor:"#2a2f3d",textStyle:{color:"#8b93a7"}}],
    series
  },true);
}
function renderStack(){
  const rows=rowsF();const times=[...new Set(rows.map(r=>tkey(r.d)))].sort();
  const series=PLATS.filter(p=>state.plats.has(p)).map(p=>{const m=agg(rows.filter(r=>r.p===p),r=>tkey(r.d));
    return {name:p,type:"bar",stack:"c",itemStyle:{color:PC[p]},data:times.map(t=>m[t]?+m[t].cost.toFixed(0):0)};});
  stackChart.setOption({tooltip:{trigger:"axis",axisPointer:{type:"shadow"},backgroundColor:"#1d212c",borderColor:"#2a2f3d",textStyle:{color:"#e6e9f0"},valueFormatter:v=>"¥"+(+v).toLocaleString()},
    legend:{data:PLATS.filter(p=>state.plats.has(p)),textStyle:{color:"#8b93a7"},top:0},
    grid:{left:60,right:16,top:30,bottom:30},
    xAxis:{type:"category",data:times,axisLabel:{color:"#8b93a7"},axisLine:{lineStyle:{color:"#2a2f3d"}}},
    yAxis:{type:"value",splitLine:{lineStyle:{color:"#20242f"}},axisLabel:{color:"#8b93a7"}},series},true);
}
function renderBar(){
  const def=metricDef(state.metric);const rows=rowsF();
  const m=agg(rows,r=>r.p);const cats=PLATS.filter(p=>state.plats.has(p));
  barChart.setOption({tooltip:{trigger:"axis",axisPointer:{type:"shadow"},backgroundColor:"#1d212c",borderColor:"#2a2f3d",textStyle:{color:"#e6e9f0"},valueFormatter:v=>fmtNum(v,def.fmt)},
    grid:{left:70,right:24,top:16,bottom:24},
    xAxis:{type:"value",splitLine:{lineStyle:{color:"#20242f"}},axisLabel:{color:"#8b93a7"}},
    yAxis:{type:"category",data:cats,axisLabel:{color:"#e6e9f0"},axisLine:{lineStyle:{color:"#2a2f3d"}}},
    series:[{type:"bar",data:cats.map(p=>+metricVal(m[p],def).toFixed(2)),itemStyle:{color:c=>PC[cats[c.dataIndex]],borderRadius:[0,4,4,0]},
      label:{show:true,position:"right",color:"#e6e9f0",formatter:o=>fmtNum(o.value,def.fmt)}}]},true);
  // color per bar
  barChart.setOption({series:[{itemStyle:{color:p=>PC[cats[p.dataIndex]]}}]});
}
function renderAll(){renderKPI();renderTrend();renderStack();renderBar();}

const pc=document.getElementById("platChips");
PLATS.forEach(p=>{const el=document.createElement("div");el.className="chip on";el.textContent=p;el.style.borderColor=PC[p];
  el.onclick=()=>{if(state.plats.has(p)){if(state.plats.size>1){state.plats.delete(p);el.classList.remove("on");}}else{state.plats.add(p);el.classList.add("on");}renderAll();};pc.appendChild(el);});
const ms=document.getElementById("metric");METRICS.forEach(m=>{const o=document.createElement("option");o.value=m.k;o.textContent=m.label;ms.appendChild(o);});
ms.onchange=()=>{state.metric=ms.value;renderTrend();renderBar();};
document.querySelectorAll("#granSeg button").forEach(b=>b.onclick=()=>{document.querySelectorAll("#granSeg button").forEach(x=>x.classList.remove("on"));b.classList.add("on");state.gran=b.dataset.g;renderTrend();renderStack();});
document.querySelectorAll("#groupSeg button").forEach(b=>b.onclick=()=>{document.querySelectorAll("#groupSeg button").forEach(x=>x.classList.remove("on"));b.classList.add("on");state.group=b.dataset.g;renderTrend();});
document.getElementById("spanRange").textContent="2026-01-01 ~ 2026-06-30";
trendChart=echarts.init(document.getElementById("trend"));
stackChart=echarts.init(document.getElementById("stack"));
barChart=echarts.init(document.getElementById("platBar"));
window.addEventListener("resize",()=>{trendChart.resize();stackChart.resize();barChart.resize();});
renderAll();
</script></body></html>
